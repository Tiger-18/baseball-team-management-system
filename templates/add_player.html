<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加球员 - 棒球队管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-baseball-ball me-2"></i>棒球队球员管理系统
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>添加新球员</h4>
                    </div>
                    <div class="card-body">
                        <form id="addPlayerForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">姓名 *</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="jersey_number" class="form-label">背号 *</label>
                                    <input type="text" class="form-control" id="jersey_number" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label d-block">投手标记</label>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="is_pitcher">
                                        <label class="form-check-label" for="is_pitcher">是否为投手</label>
                                    </div>
                                    <small class="text-muted">勾选后系统会自动加入“投手”位置，但仍可继续选择其他守备位置。</small>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label class="form-label">守备位置（可多选）</label>
                                    <select class="form-select" id="positions" multiple size="4">
                                        <option value="投手">投手</option>
                                        <option value="捕手">捕手</option>
                                        <option value="一垒手">一垒手</option>
                                        <option value="二垒手">二垒手</option>
                                        <option value="三垒手">三垒手</option>
                                        <option value="游击手">游击手</option>
                                        <option value="左外野手">左外野手</option>
                                        <option value="中外野手">中外野手</option>
                                        <option value="右外野手">右外野手</option>
                                    </select>
                                    <small class="text-muted">按住Ctrl键（Windows）或Command键（Mac）可多选</small>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label for="primary_position" class="form-label">主位置</label>
                                    <select class="form-select" id="primary_position">
                                        <option value="">选择主位置</option>
                                        <option value="投手">投手</option>
                                        <option value="捕手">捕手</option>
                                        <option value="一垒手">一垒手</option>
                                        <option value="二垒手">二垒手</option>
                                        <option value="三垒手">三垒手</option>
                                        <option value="游击手">游击手</option>
                                        <option value="左外野手">左外野手</option>
                                        <option value="中外野手">中外野手</option>
                                        <option value="右外野手">右外野手</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/players" class="btn btn-secondary me-md-2">
                                    <i class="fas fa-arrow-left"></i> 返回列表
                                </a>
                                <button type="button" class="btn btn-primary" onclick="addPlayer()">
                                    <i class="fas fa-save"></i> 保存球员信息
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
